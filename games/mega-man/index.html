<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a1e" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="description" content="Bolt Buster — a Mega Man-style action platformer playable on mobile." />
<title>Bolt Buster — Action Platformer</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    -webkit-user-select:none;user-select:none;}
  html,body{height:100%;overflow:hidden;background:#05050f;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;}
  #game{position:fixed;inset:0;display:block;touch-action:none;
    image-rendering:pixelated;background:#05050f;}
  .ovl{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;color:#dfefff;padding:26px;z-index:20;
    background:radial-gradient(120% 90% at 50% 30%,rgba(20,30,70,.96),rgba(4,6,16,.98));}
  .ovl.hide{display:none;}
  .ovl h1{font-size:32px;letter-spacing:2px;color:#36c6ff;
    text-shadow:0 0 14px rgba(54,198,255,.7),0 3px 0 #08406b;margin-bottom:6px;}
  .ovl h2{font-size:24px;margin-bottom:10px;}
  .ovl p{color:#9fc0e6;max-width:360px;line-height:1.55;font-size:14px;margin-bottom:8px;}
  .ovl .keys{font-size:12px;color:#7d97b8;margin-top:4px;}
  .ovl button{margin-top:18px;background:#36c6ff;color:#03263a;border:0;border-radius:12px;
    padding:14px 30px;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 0 #1c7fab;}
  .ovl button:active{transform:translateY(3px);box-shadow:0 1px 0 #1c7fab;}
  .tag{display:inline-block;background:rgba(54,198,255,.15);color:#36c6ff;font-size:12px;
    font-weight:700;letter-spacing:.5px;padding:5px 12px;border-radius:999px;margin-bottom:14px;}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="start" class="ovl">
  <span class="tag">🤖 ACTION PLATFORMER</span>
  <h1>BOLT BUSTER</h1>
  <p>Blast through Bolt Man's factory: run, jump, dodge spikes and turrets,
     then beat the boss. Hold <b>FIRE</b> to charge a mega shot!</p>
  <p class="keys">📱 Touch: left joystick = move · A = jump · B = fire (hold B = charge)<br>
     ⌨️ Desktop: ←/→ move · ↑ / Space jump · J / X fire</p>
  <button id="startBtn">▶ Start</button>
</div>

<div id="over" class="ovl hide">
  <h2 id="overTitle">Game Over</h2>
  <p id="overMsg"></p>
  <button id="overBtn">↻ Retry</button>
</div>

<script>
(()=>{
"use strict";

const cv=document.getElementById("game"), ctx=cv.getContext("2d");
let SCR_W=0, SCR_H=0, DPR=1, SCALE=1, OX=0, OY=0;

const GW=256, GH=224, TS=16, LH=14;          // internal res, tile size, rows
const LEVEL_W=210;                            // tiles wide
const BOSS_X=194;                             // arena left column
const ARENA_CAM=(LEVEL_W-16)*TS;              // locked camera x in boss fight
const PMAX_HP=28, BOSS_MAX=28;
const GRAV=0.62, RUN=2.1, JUMP=-9.4, MAXFALL=10;

const clamp=(v,a,b)=> v<a?a : v>b?b : v;

// ---------- Level design data ----------
const PITS=[[27,29],[58,60],[98,100],[140,142]];
const PLAT=[
  {x:14,y:9,w:4},{x:21,y:7,w:3},{x:34,y:9,w:5},{x:44,y:7,w:3},
  {x:52,y:8,w:3},{x:70,y:9,w:4},{x:78,y:7,w:3},{x:86,y:6,w:3},
  {x:108,y:9,w:4},{x:116,y:7,w:4},{x:124,y:9,w:3},{x:150,y:8,w:4},
  {x:160,y:6,w:3},{x:168,y:9,w:5},
];
const SPIKES=[
  {x:38,y:11,w:3},{x:64,y:11,w:4},{x:104,y:11,w:3},{x:130,y:11,w:4},{x:176,y:11,w:3},
];
const FOES_DEF=[
  ["met",10,11],["walk",17,8],["fly",24,5],["met",36,11],["gun",48,10],
  ["walk",55,7],["fly",60,4],["met",72,11],["walk",80,6],["gun",90,10],
  ["fly",100,5],["met",112,11],["walk",119,6],["gun",128,10],["fly",135,4],
  ["met",152,11],["walk",163,5],["fly",170,5],["gun",182,10],
];
const CHECKPTS=[2,66,134,186];

let grid;
function buildLevel(){
  grid=[];
  for(let x=0;x<LEVEL_W;x++){ const c=[]; for(let y=0;y<LH;y++) c.push(""); grid.push(c); }
  const inPit=x=>PITS.some(p=>x>=p[0]&&x<=p[1]);
  for(let x=0;x<LEVEL_W;x++) if(!inPit(x)){ grid[x][12]="#"; grid[x][13]="#"; }
  for(let x=BOSS_X;x<LEVEL_W;x++){ grid[x][12]="#"; grid[x][13]="#"; }   // arena floor
  for(let y=0;y<LH;y++) grid[LEVEL_W-1][y]="#";                          // arena right wall
  PLAT.forEach(p=>{ for(let i=0;i<p.w;i++) if(grid[p.x+i]) grid[p.x+i][p.y]="#"; });
  SPIKES.forEach(s=>{ for(let i=0;i<s.w;i++) if(grid[s.x+i]) grid[s.x+i][s.y]="^"; });
}
function sealArena(on){ for(let y=0;y<12;y++) grid[BOSS_X][y]= on?"#":""; }
const solid =(tx,ty)=> tx>=0&&ty>=0&&tx<LEVEL_W&&ty<LH && grid[tx][ty]==="#";
const spikeAt=(tx,ty)=> tx>=0&&ty>=0&&tx<LEVEL_W&&ty<LH && grid[tx][ty]==="^";

// ---------- State ----------
let player, foes, shots, eshots, parts, boss, cam,
    lives, cpIndex, state, shake, msgT, msgText="", started=false;

function spawnPlayer(tx){
  player={x:tx*TS, y:(LH-4)*TS, w:11, h:21, vx:0, vy:0, dir:1, onGround:false,
    hp:PMAX_HP, inv:0, charge:0, charging:false, cd:0, anim:0, dead:0,
    shootT:0, _j:0};
}
function spawnFoes(){
  foes=[];
  FOES_DEF.forEach(([t,tx,ty])=> foes.push({
    t, x:tx*TS, y:ty*TS, w:16, h: t==="met"?14:16, vx:0, vy:0, dir:-1,
    hp: t==="gun"?3:2, st:0, t2:Math.random()*1.5, hide:false, alive:true}));
}
function resetGame(){
  buildLevel(); lives=3; cpIndex=0;
  shots=[]; eshots=[]; parts=[]; boss=null;
  cam={x:0}; shake=0; msgT=0; state="play";
  spawnFoes(); spawnPlayer(CHECKPTS[0]);
}
function respawn(){
  lives--;
  if(lives<0){ state="gameover"; showOver("GAME OVER","Bolt Man's factory wins this round."); return; }
  shots=[]; eshots=[]; parts=[]; boss=null; sealArena(false);
  spawnFoes(); spawnPlayer(CHECKPTS[cpIndex]); state="play";
}

// ---------- Canvas + layout ----------
function resize(){
  DPR=Math.min(devicePixelRatio||1,2);
  SCR_W=innerWidth; SCR_H=innerHeight;
  cv.width=SCR_W*DPR; cv.height=SCR_H*DPR;
  cv.style.width=SCR_W+"px"; cv.style.height=SCR_H+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.imageSmoothingEnabled=false;
  SCALE=Math.max(1, Math.min(SCR_W/GW, SCR_H/GH));
  OX=Math.floor((SCR_W-GW*SCALE)/2);
  OY=Math.floor((SCR_H-GH*SCALE)/2);
  layoutPads();
}
addEventListener("resize",resize);

// ---------- Input ----------
const key={};
const IN={left:0,right:0,jump:0,fire:0};
addEventListener("keydown",e=>{ const k=e.key.toLowerCase(); key[k]=true;
  if(["arrowleft","arrowright","arrowup","arrowdown"," "].includes(k)) e.preventDefault(); });
addEventListener("keyup",e=>{ key[e.key.toLowerCase()]=false; });
function pollInput(){
  const ax=stickAxis()[0];
  IN.left =(key["arrowleft"] ||key["a"]|| ax<-0.35)?1:0;
  IN.right=(key["arrowright"]||key["d"]|| ax> 0.35)?1:0;
  IN.jump =(key["arrowup"]   ||key["w"]||key[" "]||BTN.A.on)?1:0;
  IN.fire =(key["j"]||key["x"]||key["k"]||BTN.B.on)?1:0;
}
// Touch control: floating joystick (left) + lettered buttons (right)
let stick=null, STK_R=60;
const BTN={B:{x:0,y:0,r:0,id:null,on:0,lbl:"B"},
           A:{x:0,y:0,r:0,id:null,on:0,lbl:"A"}};
function layoutPads(){
  const S=SCR_W,T=SCR_H, r=Math.max(38,Math.min(58,S*0.075));
  const by=T-Math.max(26,T*0.06);
  BTN.A.r=r*1.2; BTN.A.x=S-BTN.A.r-26; BTN.A.y=by-BTN.A.r;
  if(BTN.B){ BTN.B.r=r; BTN.B.x=BTN.A.x-BTN.A.r-BTN.B.r-18; BTN.B.y=by-BTN.B.r-4; }
  if(BTN.C){ BTN.C.r=r; BTN.C.x=BTN.B.x-BTN.B.r-BTN.C.r-18; BTN.C.y=BTN.B.y; }
  STK_R=Math.max(48,Math.min(88,S*0.11));
}
function ptPos(e){ const b=cv.getBoundingClientRect(); return [e.clientX-b.left,e.clientY-b.top]; }
function hitBtn(x,y){ for(const k in BTN){ const b=BTN[k];
  if((x-b.x)**2+(y-b.y)**2 < (b.r*1.3)**2) return k; } return null; }
function stickAxis(){
  if(!stick) return [0,0];
  const dx=stick.dx, dy=stick.dy, d=Math.hypot(dx,dy);
  if(d<STK_R*0.30) return [0,0];
  const c=Math.min(1,d/STK_R); return [dx/d*c, dy/d*c];
}
cv.addEventListener("pointerdown",e=>{
  cv.setPointerCapture(e.pointerId);
  if(state!=="play"&&state!=="boss") return;
  const [x,y]=ptPos(e), k=hitBtn(x,y);
  if(k){ BTN[k].id=e.pointerId; BTN[k].on=1; return; }
  if(!stick && x<SCR_W*0.6) stick={id:e.pointerId,ox:x,oy:y,dx:0,dy:0};
},{passive:false});
cv.addEventListener("pointermove",e=>{
  if(stick && e.pointerId===stick.id){ const [x,y]=ptPos(e);
    stick.dx=x-stick.ox; stick.dy=y-stick.oy; }
},{passive:false});
function endPtr(e){
  if(stick && e.pointerId===stick.id) stick=null;
  for(const k in BTN) if(BTN[k].id===e.pointerId){ BTN[k].id=null; BTN[k].on=0; }
}
cv.addEventListener("pointerup",endPtr);
cv.addEventListener("pointercancel",endPtr);

// ---------- Physics ----------
function moveX(o){
  o.x+=o.vx;
  const top=Math.floor(o.y/TS), bot=Math.floor((o.y+o.h-1)/TS);
  if(o.vx>0){ const tx=Math.floor((o.x+o.w)/TS);
    for(let ty=top;ty<=bot;ty++) if(solid(tx,ty)){ o.x=tx*TS-o.w; o.vx=0; break; } }
  else if(o.vx<0){ const tx=Math.floor(o.x/TS);
    for(let ty=top;ty<=bot;ty++) if(solid(tx,ty)){ o.x=(tx+1)*TS; o.vx=0; break; } }
}
function moveY(o){
  o.y+=o.vy; o.onGround=false;
  const lf=Math.floor(o.x/TS), rt=Math.floor((o.x+o.w-1)/TS);
  if(o.vy>0){ const ty=Math.floor((o.y+o.h)/TS);
    for(let tx=lf;tx<=rt;tx++) if(solid(tx,ty)){ o.y=ty*TS-o.h; o.vy=0; o.onGround=true; break; } }
  else if(o.vy<0){ const ty=Math.floor(o.y/TS);
    for(let tx=lf;tx<=rt;tx++) if(solid(tx,ty)){ o.y=(ty+1)*TS; o.vy=0; break; } }
}
function touchSpike(o){
  const lf=Math.floor((o.x+2)/TS), rt=Math.floor((o.x+o.w-3)/TS);
  const tp=Math.floor(o.y/TS), bt=Math.floor((o.y+o.h-1)/TS);
  for(let tx=lf;tx<=rt;tx++)for(let ty=tp;ty<=bt;ty++) if(spikeAt(tx,ty)) return true;
  return false;
}
const aabb=(a,b)=> a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y;

// ---------- Update ----------
function update(){
  if(state!=="play"&&state!=="boss") return;
  if(shake>0) shake--;
  if(msgT>0) msgT--;
  const p=player;

  if(p.dead>0){ p.dead--; p.vy=Math.min(MAXFALL,p.vy+GRAV); p.y+=p.vy;
    updateParts(); if(p.dead===0) respawn(); return; }

  pollInput();
  if(IN.left&&!IN.right){ p.vx=-RUN; p.dir=-1; }
  else if(IN.right&&!IN.left){ p.vx=RUN; p.dir=1; }
  else p.vx=0;
  moveX(p);

  if(IN.jump&&p.onGround){ p.vy=JUMP; p.onGround=false; p._j=1; }
  if(!IN.jump&&p.vy<0&&p._j){ p.vy*=0.55; p._j=0; }
  p.vy=Math.min(MAXFALL,p.vy+GRAV);
  moveY(p);
  if(p.vx&&p.onGround) p.anim+=0.25;

  while(cpIndex<CHECKPTS.length-1 && p.x>CHECKPTS[cpIndex+1]*TS) cpIndex++;

  if(p.cd>0) p.cd--;
  if(IN.fire){
    if(!p.charging){ p.charging=true; firePlayer(0); }
    else p.charge=Math.min(60,p.charge+1);
  } else if(p.charging){
    if(p.charge>=40) firePlayer(2); else if(p.charge>=20) firePlayer(1);
    p.charging=false; p.charge=0;
  }

  if(p.inv>0) p.inv--;
  if(touchSpike(p)) killPlayer();
  else if(p.y>GH+60) killPlayer();

  if(!boss && state==="play" && p.x>(BOSS_X+1)*TS){
    state="boss"; sealArena(true);
    boss={x:(LEVEL_W-7)*TS, y:(LH-6)*TS, w:26, h:30, vx:0, vy:0, dir:-1,
      onGround:false, hp:BOSS_MAX, t:60, inv:0, intro:70, a:0};
    msg("⚠  BOLT MAN");
  }

  updateShots(); updateFoes(); if(boss) updateBoss(); updateParts();

  if(state==="boss") cam.x=ARENA_CAM;
  else { const cx=clamp(p.x+p.w/2-GW/2,0,LEVEL_W*TS-GW);
    cam.x += (cx-cam.x)*0.2; }
}

function firePlayer(lvl){
  if(lvl===0){
    if(shots.length>=3 || player.cd>0) return;
    player.cd=10;
  }
  const sz= lvl===2?7: lvl===1?5:3;
  const dmg=lvl===2?3: lvl===1?2:1;
  const sp= lvl===2?5.4: lvl===1?4.9:4.4;
  shots.push({x:player.x+(player.dir>0?player.w:-sz), y:player.y+8,
    w:sz, h:sz, vx:sp*player.dir, dmg, lvl, dead:0});
  player.shootT=8;
  if(lvl>=1) shake=Math.max(shake,4);
}
function hurtPlayer(dmg){
  if(player.inv>0 || player.dead>0) return;
  player.hp-=dmg; player.inv=72; shake=5;
  if(player.hp<=0) killPlayer();
}
function killPlayer(){
  if(player.dead>0) return;
  player.dead=72; player.vy=-7; player.vx=0; player.hp=0;
  boom(player.x+player.w/2, player.y+player.h/2, "#36c6ff");
}

function updateShots(){
  for(const s of shots){
    s.x+=s.vx;
    if(s.x<cam.x-24||s.x>cam.x+GW+24){ s.dead=1; continue; }
    const tx=Math.floor((s.x+s.w/2)/TS), ty=Math.floor((s.y+s.h/2)/TS);
    if(solid(tx,ty)){ s.dead=1; spark(s.x,s.y); continue; }
    for(const f of foes){ if(f.alive&&!f.hide&&aabb(s,f)){
      f.hp-=s.dmg; spark(s.x,s.y); if(s.lvl<2) s.dead=1;
      if(f.hp<=0){ f.alive=false; boom(f.x+8,f.y+8,"#ff9a40"); } break; } }
    if(boss && boss.intro<=0 && boss.inv<=0 && aabb(s,boss)){
      boss.hp-=s.dmg; boss.inv=10; s.dead=1; spark(s.x,s.y); shake=4;
      if(boss.hp<=0) winGame();
    }
  }
  shots=shots.filter(s=>!s.dead);
  for(const e of eshots){
    e.x+=e.vx; e.y+=e.vy;
    if(e.x<cam.x-24||e.x>cam.x+GW+24||e.y<-24||e.y>GH+24){ e.dead=1; continue; }
    if(solid(Math.floor((e.x+2)/TS),Math.floor((e.y+2)/TS))){ e.dead=1; continue; }
    if(aabb({x:e.x,y:e.y,w:5,h:5},player)){ e.dead=1; hurtPlayer(3); }
  }
  eshots=eshots.filter(e=>!e.dead);
}

function updateFoes(){
  for(const f of foes){
    if(!f.alive) continue;
    if(f.x<cam.x-70||f.x>cam.x+GW+90) continue;       // dormant offscreen
    if(f.t==="walk"){
      f.x+=f.dir*0.85;
      const ahead=Math.floor((f.x+(f.dir>0?f.w+1:-1))/TS);
      const mid=Math.floor((f.y+f.h/2)/TS);
      const foot=Math.floor((f.y+f.h+1)/TS);
      if(solid(ahead,mid) || !solid(ahead,foot)) f.dir*=-1;
      f.vy=Math.min(MAXFALL,f.vy+GRAV); moveY(f);
    } else if(f.t==="fly"){
      f.t2+=0.05;
      if(f.hy0===undefined) f.hy0=f.y;
      f.x+=Math.sign(player.x-f.x)*0.7;
      f.y=f.hy0+Math.sin(f.t2)*22;
    } else if(f.t==="met"){
      f.vy=Math.min(MAXFALL,f.vy+GRAV); moveY(f);
      if(--f.st<=0){
        if(f.hide){ f.hide=false; f.st=70;
          const dx=player.x-f.x;
          for(const a of [-0.4,0,0.4]) eshots.push({
            x:f.x+6,y:f.y+4,w:5,h:5,vx:(dx>0?2.4:-2.4),vy:a*2.4,dead:0});
        } else { f.hide=true; f.st=85; }
      }
    } else if(f.t==="gun"){
      f.vy=Math.min(MAXFALL,f.vy+GRAV); moveY(f);
      if(--f.st<=0 && Math.abs(player.x-f.x)<GW*0.6){
        f.st=80; f.dir=player.x<f.x?-1:1;
        eshots.push({x:f.x+6,y:f.y+5,w:5,h:5,vx:3*f.dir,vy:0,dead:0});
      }
    }
    if(f.alive&&!f.hide&&player.dead<=0&&player.inv<=0&&aabb(f,player))
      hurtPlayer(f.t==="walk"?4:3);
  }
  foes=foes.filter(f=>f.alive);
}

function updateBoss(){
  const b=boss;
  if(b.inv>0) b.inv--;
  if(b.intro>0){ b.intro--; if(b.intro===0) b.t=40; return; }
  b.vy=Math.min(MAXFALL,b.vy+GRAV);
  b.x+=b.vx;
  const aL=(LEVEL_W-15)*TS, aR=(LEVEL_W-2)*TS-b.w;
  if(b.x<aL){ b.x=aL; b.dir=1; if(!b.onGround)b.vx=Math.abs(b.vx); }
  if(b.x>aR){ b.x=aR; b.dir=-1; if(!b.onGround)b.vx=-Math.abs(b.vx); }
  moveY(b);
  if(--b.t<=0){
    if(b.onGround){
      b.a=(b.a+1)%3;
      if(b.a===0){ b.vy=-9; b.vx=(player.x>b.x?1:-1)*1.7; b.dir=Math.sign(b.vx)||1; b.t=64; }
      else {
        const dx=player.x-b.x;
        for(const a of [-0.5,-0.15,0.2,0.55]) eshots.push({
          x:b.x+b.w/2, y:b.y+12, w:6, h:6, vx:(dx>0?2.7:-2.7), vy:a*2.7, dead:0});
        b.vx=0; b.t=58;
      }
    } else b.t=8;
  }
  if(b.onGround && b.t>40) b.vx*=0.9;
  if(player.dead<=0&&player.inv<=0&&aabb(b,player)) hurtPlayer(5);
}

function spark(x,y){ for(let i=0;i<5;i++) parts.push({
  x,y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:10,c:"#cfefff",g:0}); }
function boom(x,y,c){ shake=Math.max(shake,7);
  for(let i=0;i<18;i++){ const a=Math.random()*6.28,s=1+Math.random()*3;
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:26,c,g:0.12}); } }
function updateParts(){ for(const q of parts){ q.x+=q.vx; q.y+=q.vy; q.vy+=q.g; q.life--; }
  parts=parts.filter(q=>q.life>0); }

function winGame(){ boss=null; state="win"; shake=12;
  boom((LEVEL_W-6)*TS,(LH-6)*TS,"#ffd24a");
  showOver("✦ STAGE CLEAR ✦","Bolt Man defeated — you saved the factory!"); }
function msg(t){ msgText=t; msgT=150; }

// ---------- Render ----------
function draw(){
  ctx.fillStyle="#0b0f24"; ctx.fillRect(0,0,SCR_W,SCR_H);
  ctx.save();
  ctx.translate(OX,OY); ctx.scale(SCALE,SCALE);
  ctx.beginPath(); ctx.rect(0,0,GW,GH); ctx.clip();
  const sx= shake? (Math.random()-.5)*shake:0;
  const sy= shake? (Math.random()-.5)*shake:0;
  ctx.translate(-Math.floor(cam.x)+sx, sy);

  drawBG();
  const c0=Math.max(0,Math.floor(cam.x/TS)-1);
  const c1=Math.min(LEVEL_W-1,Math.floor((cam.x+GW)/TS)+1);
  for(let x=c0;x<=c1;x++)for(let y=0;y<LH;y++){
    const t=grid[x][y]; if(!t) continue;
    const px=x*TS, py=y*TS;
    if(t==="#"){
      ctx.fillStyle="#2b3a72"; ctx.fillRect(px,py,TS,TS);
      ctx.fillStyle="#3a4f9c"; ctx.fillRect(px+1,py+1,TS-2,4);
      ctx.fillStyle="#1c2750"; ctx.fillRect(px+1,py+TS-3,TS-2,2);
    } else {
      ctx.fillStyle="#c9d4ff";
      for(let i=0;i<2;i++){ const bx=px+i*8;
        ctx.beginPath(); ctx.moveTo(bx,py+TS); ctx.lineTo(bx+4,py+4);
        ctx.lineTo(bx+8,py+TS); ctx.closePath(); ctx.fill(); }
    }
  }
  drawFoes(); if(boss) drawBoss(); drawShots(); drawPlayer(); drawParts();
  ctx.restore();
  drawHUD();
  if(state==="play"||state==="boss") drawPads();
}
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,"#141a3e"); g.addColorStop(1,"#0a0e22");
  ctx.fillStyle=g; ctx.fillRect(cam.x,0,GW,GH);
  ctx.fillStyle="rgba(80,110,200,.12)";
  for(let i=0;i<16;i++){
    const bx=cam.x - (cam.x*0.4 % 80) + i*80 - 80;
    ctx.fillRect(bx, GH-92-(i%3)*20, 42, 92+(i%3)*20);
  }
}
function drawPlayer(){
  const p=player;
  if(p.inv>0 && p.inv%6<3 && p.dead<=0) return;
  const x=Math.round(p.x), y=Math.round(p.y), d=p.dir;
  ctx.fillStyle="#1f6fd6";
  const step = (p.onGround&&p.vx)? (Math.floor(p.anim)%2?3:0) : 1;
  ctx.fillRect(x+1,y+15,4,6); ctx.fillRect(x+6,y+15-step,4,6+step);
  ctx.fillStyle="#36c6ff"; ctx.fillRect(x,y+6,p.w,10);
  ctx.fillStyle="#1f6fd6"; ctx.fillRect(x,y+13,p.w,3);
  ctx.fillStyle="#bfe8ff"; ctx.fillRect(x+2,y,8,7);
  ctx.fillStyle="#1f6fd6"; ctx.fillRect(x+1,y-1,10,3);
  ctx.fillStyle="#0a2a44"; ctx.fillRect(x+(d>0?7:2),y+2,2,2);
  if(p.shootT>0){ p.shootT--;
    ctx.fillStyle="#bfe8ff"; ctx.fillRect(x+(d>0?p.w:-4),y+8,4,4); }
  if(p.charging && p.charge>=20){
    const r=2+(p.charge/60)*5;
    ctx.fillStyle = p.charge>=40?"rgba(255,230,90,.85)":"rgba(120,220,255,.7)";
    ctx.beginPath(); ctx.arc(x+(d>0?p.w+3:-3),y+10,r,0,6.28); ctx.fill();
  }
}
function drawShots(){
  for(const s of shots){
    ctx.fillStyle= s.lvl===2?"#ffe65a": s.lvl===1?"#9be7ff":"#dff4ff";
    ctx.beginPath(); ctx.arc(s.x+s.w/2,s.y+s.h/2,s.w/2+1,0,6.28); ctx.fill();
  }
  ctx.fillStyle="#ff6a6a";
  for(const e of eshots){ ctx.beginPath(); ctx.arc(e.x+2,e.y+2,3,0,6.28); ctx.fill(); }
}
function drawFoes(){
  for(const f of foes){
    if(!f.alive) continue;
    const x=Math.round(f.x), y=Math.round(f.y);
    if(f.t==="met"){
      ctx.fillStyle="#f6c453";
      if(f.hide) ctx.fillRect(x+1,y+8,14,6);
      else { ctx.beginPath(); ctx.arc(x+8,y+10,8,Math.PI,0); ctx.fill();
        ctx.fillStyle="#2a2a2a"; ctx.fillRect(x+5,y+7,6,3); }
    } else if(f.t==="walk"){
      ctx.fillStyle="#ff7b54"; ctx.fillRect(x,y+2,16,12);
      ctx.fillStyle="#3a1a10"; ctx.fillRect(x+(f.dir>0?11:2),y+5,3,3);
      ctx.fillStyle="#b03a1f"; ctx.fillRect(x,y+13,16,3);
    } else if(f.t==="fly"){
      ctx.fillStyle="#b07bff";
      ctx.beginPath(); ctx.arc(x+8,y+8,7,0,6.28); ctx.fill();
      ctx.fillStyle="#e8d6ff";
      const w=Math.sin(performance.now()/60)*4;
      ctx.fillRect(x-3,y+6-w,4,4); ctx.fillRect(x+15,y+6-w,4,4);
    } else {
      ctx.fillStyle="#7a8aa8"; ctx.fillRect(x,y,16,16);
      ctx.fillStyle="#cdd8f0"; ctx.fillRect(x+(f.dir>0?12:0),y+5,4,5);
      ctx.fillStyle="#ff6a6a"; ctx.fillRect(x+6,y+6,4,4);
    }
  }
}
function drawBoss(){
  const b=boss;
  const x=Math.round(b.x), y=Math.round(b.y);
  ctx.fillStyle=(b.inv>0&&b.inv%4<2)?"#ffffff":"#d23b6b";
  ctx.fillRect(x,y+6,b.w,b.h-6);
  ctx.fillStyle="#7a1030"; ctx.fillRect(x,y+b.h-6,b.w,6);
  ctx.fillStyle="#ffd24a"; ctx.fillRect(x+4,y,b.w-8,8);
  ctx.fillStyle="#3a0a1a"; ctx.fillRect(x+(b.dir>0?b.w-9:5),y+11,4,3);
  ctx.fillStyle="#ff8fae"; ctx.fillRect(x+5,y+17,b.w-10,4);
}
function drawParts(){
  for(const q of parts){ ctx.globalAlpha=Math.max(0,q.life/26);
    ctx.fillStyle=q.c; ctx.fillRect(q.x,q.y,2,2); }
  ctx.globalAlpha=1;
}
function bar(x,y,val,max,col){
  ctx.fillStyle="#0a1430"; ctx.fillRect(x-1,y-1,8,max*2+2);
  for(let i=0;i<max;i++){ ctx.fillStyle=i<val?col:"#243056";
    ctx.fillRect(x,y+(max-1-i)*2,6,2); }
}
function drawHUD(){
  ctx.save(); ctx.translate(OX,OY); ctx.scale(SCALE,SCALE);
  bar(8,8, Math.max(0,player?player.hp:0), PMAX_HP, "#36c6ff");
  if(boss) bar(GW-15,8, Math.max(0,boss.hp), BOSS_MAX, "#ff5a8a");
  ctx.fillStyle="#dff4ff"; ctx.font="8px monospace"; ctx.textBaseline="top";
  ctx.fillText("x"+Math.max(0,lives), 20, 9);
  if(msgT>0){
    ctx.globalAlpha=Math.min(1,msgT/30);
    ctx.fillStyle="#ff5a8a"; ctx.font="bold 16px monospace"; ctx.textAlign="center";
    ctx.fillText(msgText,GW/2,GH*0.30); ctx.textAlign="left"; ctx.globalAlpha=1;
  }
  ctx.restore();
}
function pbtn(b){
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,6.2832);
  ctx.fillStyle=b.on?"rgba(255,255,255,.42)":"rgba(255,255,255,.12)"; ctx.fill();
  ctx.lineWidth=3; ctx.strokeStyle="rgba(255,255,255,.5)"; ctx.stroke();
  ctx.fillStyle="rgba(255,255,255,.95)";
  ctx.font="bold "+Math.floor(b.r*0.78)+"px system-ui";
  ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(b.lbl,b.x,b.y+1);
  ctx.textAlign="left";
}
function drawStick(){
  let ox,oy,dx=0,dy=0;
  if(stick){ ox=stick.ox; oy=stick.oy; dx=stick.dx; dy=stick.dy;
    const d=Math.hypot(dx,dy); if(d>STK_R){ dx=dx/d*STK_R; dy=dy/d*STK_R; } }
  else { ox=Math.max(STK_R+24,SCR_W*0.14);
    oy=SCR_H-Math.max(STK_R+24,SCR_H*0.17); ctx.globalAlpha=0.5; }
  ctx.lineWidth=3; ctx.strokeStyle="rgba(255,255,255,.30)";
  ctx.beginPath(); ctx.arc(ox,oy,STK_R,0,6.2832); ctx.stroke();
  ctx.fillStyle="rgba(255,255,255,.55)";
  ctx.beginPath(); ctx.arc(ox+dx,oy+dy,STK_R*0.42,0,6.2832); ctx.fill();
  ctx.globalAlpha=1;
}
function drawPads(){ drawStick(); if(BTN.C)pbtn(BTN.C); if(BTN.B)pbtn(BTN.B); pbtn(BTN.A); }

// ---------- Overlays + loop ----------
const elStart=document.getElementById("start"), elOver=document.getElementById("over");
function showOver(t,m){ document.getElementById("overTitle").textContent=t;
  document.getElementById("overMsg").textContent=m; elOver.classList.remove("hide"); }
document.getElementById("startBtn").onclick=()=>{ elStart.classList.add("hide");
  started=true; resetGame(); };
document.getElementById("overBtn").onclick=()=>{ elOver.classList.add("hide");
  started=true; resetGame(); };

let acc=0, last=performance.now();
function loop(now){
  let dt=now-last; last=now; if(dt>100) dt=100;
  acc+=dt; let steps=0;
  while(acc>=1000/60 && steps<4){ if(started) update(); acc-=1000/60; steps++; }
  if(started) draw();
  requestAnimationFrame(loop);
}

// init: build everything before first use
buildLevel();
shots=[]; eshots=[]; parts=[]; foes=[]; boss=null;
cam={x:0}; lives=3; cpIndex=0; shake=0; msgT=0; state="title";
spawnPlayer(CHECKPTS[0]);
resize();
requestAnimationFrame(loop);
})();
</script>
