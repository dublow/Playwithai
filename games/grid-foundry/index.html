<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />
<meta name="description" content="GRID FOUNDRY — un puzzle industriel stratégique compact. Chaînes de production, bonus de voisinage, spécialisations, sur une grille limitée." />
<title>GRID FOUNDRY — puzzle industriel</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2300d3a7'/%3E%3Crect x='7' y='7' width='7' height='7' fill='%230a0e14'/%3E%3Crect x='18' y='7' width='7' height='7' fill='%230a0e14'/%3E%3Crect x='7' y='18' width='7' height='7' fill='%230a0e14'/%3E%3Crect x='18' y='18' width='7' height='7' fill='%230a0e14'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0&family=Inter:wght@400;500;600;700&display=swap" />
<link rel="stylesheet" href="style.css?v=18" />
</head>
<body>
<div id="app">

  <div id="gridWrap">
    <div id="grid" class="grid"></div>
  </div>

  <button id="hdrToggle" class="fab" title="Ressources" aria-label="Ressources">
    <span class="ms">inventory_2</span>
  </button>

  <header id="resHeader" class="res-header">
    <div class="rh-top">
      <div id="resObjective" class="rh-obj"></div>
      <div class="rh-act">
        <button id="expandBtn" class="btn expand hidden"></button>
        <button id="menuBtn" class="btn ghost icon" title="Menu"><span class="ms">settings</span></button>
        <button id="hdrClose" class="btn ghost icon" title="Fermer"><span class="ms">close</span></button>
      </div>
    </div>
    <div id="resourceBar" class="resbar" aria-label="Ressources"></div>
  </header>

  <div id="sheet" class="sheet hidden">
    <div class="sheet-card"><div id="sheetBody"></div></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <div id="modalBody"></div>
    </div>
  </div>

</div>
<script src="script.js?v=18"></script>
</body>
</html>
