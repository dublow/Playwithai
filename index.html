<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0d1b2a" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Play with AI — Game Arcade</title>
<style>
  :root{--bg:#0d1b2a;--panel:#16263b;--panel2:#1e3550;--accent:#39c0ed;
    --text:#eaf2fb;--muted:#9fb3c8;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;min-height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;}
  body{background:radial-gradient(120% 80% at 50% -10%,#1b3553 0%,#0d1b2a 60%) no-repeat;}
  .wrap{max-width:880px;margin:0 auto;
    padding:calc(28px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right))
            calc(40px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));}
  header{text-align:center;margin-bottom:26px;}
  .logo{font-size:42px;line-height:1;}
  h1{font-size:26px;margin:10px 0 4px;letter-spacing:.4px;}
  header p{color:var(--muted);margin:0;font-size:14px;}
  .grid{display:grid;gap:14px;grid-template-columns:1fr;}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr;}}
  .card{display:flex;flex-direction:column;background:var(--panel);
    border:1px solid #243b56;border-radius:18px;overflow:hidden;
    text-decoration:none;color:inherit;transition:transform .15s,border-color .15s,background .15s;}
  .card:active{transform:scale(.98);}
  .card:hover{border-color:var(--accent);background:var(--panel2);}
  .thumb{font-size:54px;text-align:center;padding:30px 0 24px;
    background:linear-gradient(160deg,#1f3a57,#16263b);}
  .body{padding:14px 16px 18px;display:flex;flex-direction:column;gap:8px;flex:1;}
  .title-row{display:flex;align-items:center;gap:8px;justify-content:space-between;}
  .title-row h2{font-size:17px;margin:0;}
  .tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
    color:#04222e;background:var(--accent);padding:3px 8px;border-radius:999px;}
  .tag.soon{background:#34526f;color:var(--muted);}
  .desc{color:var(--muted);font-size:13px;line-height:1.5;flex:1;margin:0;}
  .play{margin-top:6px;align-self:flex-start;background:var(--accent);color:#04222e;
    font-weight:700;font-size:14px;padding:9px 18px;border-radius:10px;}
  .card.disabled{pointer-events:none;opacity:.6;}
  .card.disabled .play{background:#34526f;color:var(--muted);}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:30px;line-height:1.6;}
  footer a{color:var(--accent);text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🕹️</div>
    <h1>Play with AI</h1>
    <p>A little arcade of browser games — built for mobile, playable anywhere.</p>
  </header>

  <main class="grid" id="grid"></main>

  <footer>
    Tap a game to play instantly — no install, works offline once loaded.<br>
    Add it to your home screen for a full-screen experience.
  </footer>
</div>

<script>
  // Add new games here and they appear on the hub automatically.
  const GAMES = [
    {
      title: "Pocket City",
      icon: "🏙️",
      tag: "City Builder",
      desc: "A SimCity-style city builder for mobile. Zone, road, power and grow your metropolis.",
      url: "games/pocket-city/index.html",
      ready: true
    },
    {
      title: "Super Run",
      icon: "🍄",
      tag: "Platformer",
      desc: "A Mario-style one-tap auto-runner — tap anywhere to jump, stomp enemies and grab coins across 2 levels.",
      url: "games/super-run/index.html",
      ready: true
    },
    {
      title: "Star Requiem",
      icon: "🚀",
      tag: "Shoot 'em up",
      desc: "A neon shoot 'em up with intro, upgrade bay, story & ending — 3 stages and a 3-phase final boss.",
      url: "games/star-requiem/index.html",
      ready: true
    },
    {
      title: "Mini Quest",
      icon: "⚔️",
      tag: "Adventure",
      desc: "A Zelda-style top-down adventure — explore rooms, slash monsters, find the key and claim the Triforce.",
      url: "games/zelda-like/index.html",
      ready: true
    },
    {
      title: "Bolt Buster",
      icon: "🤖",
      tag: "Platformer",
      desc: "A Mega Man-style run-and-gun: dash, jump, charge your buster through a factory stage and beat the boss.",
      url: "games/mega-man/index.html",
      ready: true
    },
    {
      title: "Micro Racers",
      icon: "🏎️",
      tag: "Racing",
      desc: "A Micro Machines-style top-down toy racer — steer, gas and brake through 3 laps against 3 rivals.",
      url: "games/micro-racers/index.html",
      ready: true
    },
    {
      title: "Worldtree",
      icon: "🌲",
      tag: "Action RPG",
      desc: "A Faxanadu-style action RPG — earn titles, buy gear &amp; the Mantra Key, then slay the Evil One.",
      url: "games/faxanadu-like/index.html",
      ready: true
    },
    {
      title: "Neon Highway USA",
      icon: "🌴",
      tag: "Racing",
      desc: "A Cruis'n-style pseudo-3D arcade racer — beat the clock across neon-sunset highways, dodge traffic, grab checkpoints &amp; nitro.",
      url: "games/neon-highway/index.html",
      ready: true
    },
    {
      title: "Temple Raiders",
      icon: "🏺",
      tag: "Pinball",
      desc: "A 90s Indiana-Jones-style pinball machine — work the flippers, light the I-D-O-L targets and shoot the left orbit to escape the temple with the Golden Idol.",
      url: "games/temple-pinball/index.html",
      ready: true
    }
  ];

  const grid = document.getElementById("grid");
  GAMES.forEach(g => {
    const a = document.createElement("a");
    a.className = "card" + (g.ready ? "" : " disabled");
    a.href = g.ready ? g.url : "#";
    if (!g.ready) a.setAttribute("aria-disabled", "true");
    a.innerHTML = `
      <div class="thumb">${g.icon}</div>
      <div class="body">
        <div class="title-row">
          <h2>${g.title}</h2>
          <span class="tag ${g.ready ? "" : "soon"}">${g.tag}</span>
        </div>
        <p class="desc">${g.desc}</p>
        <span class="play">${g.ready ? "▶ Play" : "Coming soon"}</span>
      </div>`;
    grid.appendChild(a);
  });
</script>
</body>
</html>
