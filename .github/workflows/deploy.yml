name: Deploy Game Arcade to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/mobile-city-sim-game-DpDlD
  workflow_dispatch:

# Pushing to the gh-pages branch needs write access to repo contents.
permissions:
  contents: write

# One publish at a time; newer runs cancel in-progress ones.
concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r games _site/
          # Serve every file/folder as-is (skip Jekyll processing).
          touch _site/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          # Keep gh-pages as a single tidy commit (no history buildup).
          force_orphan: true
          commit_message: "Deploy arcade from ${{ github.sha }}"
