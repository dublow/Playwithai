name: Deploy to GitHub Pages

# Deploys the static site (portfolio + all project folders) to GitHub Pages.
# `configure-pages` with enablement:true turns Pages on automatically, so no
# manual Settings step is needed. The site is 100% static (no build).

on:
  push:
    branches: [main, master, "claude/**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
